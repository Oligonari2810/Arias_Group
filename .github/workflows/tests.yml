name: Tests
on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: arias
          POSTGRES_PASSWORD: arias
          POSTGRES_DB: arias_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FLASK_DEBUG: '1'
      SECRET_KEY: ci-test-secret
      TEST_DATABASE_URL: postgresql+psycopg://arias:arias@localhost:5433/arias_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest
      - name: Validate per-function coverage gate
        run: pytest tests/test_coverage_gate.py --no-cov -v -s
      - name: Upload coverage HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
