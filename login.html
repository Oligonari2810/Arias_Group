{% extends "base.html" %}

{% block title %}Login — Fassa Ops{% endblock %}

{% block content %}
<div style="max-width:400px; margin:80px auto; padding:32px; background:#fff; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.1);">
    <h2 style="text-align:center; margin-bottom:24px;">🔐 Fassa–Arias Group</h2>
    <p style="text-align:center; color:#666; margin-bottom:24px;">Caribbean Operations</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <div style="padding:12px; background:#fef3c7; border-radius:6px; margin-bottom:16px; color:#92400e;">
        {{ messages[0] }}
    </div>
    {% endif %}
    {% endwith %}

    <form method="POST">
        <div style="margin-bottom:16px;">
            <label for="username" style="display:block; margin-bottom:4px; font-weight:600;">Usuario</label>
            <input type="text" id="username" name="username" required autofocus
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px; font-size:15px;">
        </div>
        <div style="margin-bottom:20px;">
            <label for="password" style="display:block; margin-bottom:4px; font-weight:600;">Contraseña</label>
            <input type="password" id="password" name="password" required
                   style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:6px; font-size:15px;">
        </div>
        <button type="submit"
                style="width:100%; padding:12px; background:#1e40af; color:#fff; border:none; border-radius:6px; font-size:15px; font-weight:600; cursor:pointer;">
            Entrar
        </button>
    </form>
</div>
{% endblock %}
