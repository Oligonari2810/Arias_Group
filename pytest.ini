[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --cov=app --cov-report=term-missing --cov-report=html --cov-report=json --ignore=tests/test_coverage_gate.py
markers =
    unit: pure-function tests
    integration: tests touching the Flask app + SQLite temp DB
# NOTE: tests/test_coverage_gate.py is excluded from default discovery because
# pytest-cov writes coverage.json at session-finish, so the gate cannot read
# live data. Invoke it separately:  pytest tests/test_coverage_gate.py --no-cov
