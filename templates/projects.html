{% extends 'base.html' %}
{% block content %}
<h1>Proyectos</h1>
<div class="grid-2">
  <div class="card">
    <h2>Nuevo</h2>
    <form method="post">
      <div class="row">
        <div><label>Cliente<select name="client_id">{% for c in clients %}<option value="{{ c['id'] }}">{{ c['name'] }}{% if c['company'] %} - {{ c['company'] }}{% endif %}</option>{% endfor %}</select></label></div>
        <div><label>Nombre<input name="name" required></label></div>
      </div>
      <div class="row">
        <div><label>Tipo proyecto<input name="project_type"></label></div>
        <div><label>Ubicación<input name="location"></label></div>
      </div>
      <div class="row">
        <div><label>Área m²<input name="area_sqm" type="number" step="0.01"></label></div>
        <div><label>Etapa<select name="stage">{% for s in stages %}<option>{{ s }}</option>{% endfor %}</select></label></div>
      </div>
      <div class="row">
        <div><label>GO / NO-GO<select name="go_no_go"><option>PENDING</option><option>GO</option><option>NO-GO</option></select></label></div>
        <div><label>INCOTERM<select name="incoterm"><option>EXW</option><option>FOB</option><option>DAP</option></select></label></div>
      </div>
      <div class="row">
        <div><label>FX<input name="fx_rate" type="number" step="0.0001" value="1"></label></div>
        <div><label>Margen objetivo<input name="target_margin_pct" type="number" step="0.01" value="0.30"></label></div>
      </div>
      <div class="row">
        <div><label>Flete EUR<input name="freight_eur" type="number" step="0.01" value="0"></label></div>
        <div></div>
      </div>
      <label>Notas<textarea name="logistics_notes"></textarea></label>
      <button>Guardar proyecto</button>
    </form>
  </div>
  <div class="card">
    <h2>Listado</h2>
    <table>
      <thead><tr><th>Proyecto</th><th>Cliente</th><th>Etapa</th><th>GO</th><th class="num">m²</th></tr></thead>
      <tbody>
        {% for p in projects %}
          <tr>
            <td><a href="{{ url_for('project_detail', project_id=p['id']) }}">{{ p['name'] }}</a></td>
            <td>{{ p['client_name'] }}</td>
            <td>{{ p['stage'] }}</td>
            <td>{{ p['go_no_go'] }}</td>
            <td class="num">{{ p['area_sqm'] }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
