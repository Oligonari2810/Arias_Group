{% extends "base.html" %}

{% block title %}Login — Fassa Ops{% endblock %}

{% block content %}
<div style="max-width:320px; margin:60px auto; text-align:center;">
  <img src="{{ url_for('static', filename='logos/arias_group_logo.svg') }}" alt="Arias Group" style="height:64px; margin-bottom:12px;">
  <h1 style="font-size:16px;">Fassa–Arias Group · Caribbean Ops</h1>
  <form method="POST">
    <label for="username">Usuario</label>
    <input type="text" id="username" name="username" required autofocus style="width:100%; margin-bottom:8px;">
    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" required style="width:100%; margin-bottom:10px;">
    <button type="submit" style="width:100%;">Entrar</button>
  </form>
</div>
{% endblock %}
